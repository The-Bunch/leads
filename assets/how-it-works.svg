<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 330" role="img" aria-label="Your platform sends one POST to /partner/sessions; a lead is created in Bill OS; webhooks echo referral_id and context back to you.">
  <defs>
    <style>
      .card { fill: #ffffff; stroke-width: 3; }
      .title { font-family: 'General Sans', Arial, Helvetica, sans-serif; font-weight: 600; font-size: 21px; }
      .sub { font-family: 'General Sans', Arial, Helvetica, sans-serif; font-size: 14px; fill: #4a4a4a; }
      .code { font-family: ui-monospace, 'SF Mono', Consolas, monospace; font-size: 13px; }
    </style>
  </defs>

  <!-- oat cream canvas -->
  <rect x="0" y="0" width="960" height="330" rx="24" fill="#fff0e0"/>

  <!-- your platform -->
  <rect class="card" x="48" y="92" width="232" height="116" rx="16" stroke="#00725e"/>
  <text class="title" x="164" y="142" text-anchor="middle" fill="#00725e">Your platform</text>
  <text class="sub" x="164" y="170" text-anchor="middle">tenant record + consent</text>

  <!-- arrow 1 -->
  <line x1="280" y1="150" x2="384" y2="150" stroke="#00725e" stroke-width="3" stroke-linecap="round"/>
  <path d="M384,150 l-12,-7 v14 z" fill="#00725e"/>
  <text class="code" x="332" y="128" text-anchor="middle" fill="#00725e">one POST</text>

  <!-- the call -->
  <rect x="396" y="92" width="248" height="116" rx="16" fill="#00725e"/>
  <text class="code" x="520" y="140" text-anchor="middle" fill="#ffffff">/partner/sessions</text>
  <text class="sub" x="520" y="168" text-anchor="middle" style="fill:#e7f4ed">auth, retries + idempotency</text>
  <text class="sub" x="520" y="188" text-anchor="middle" style="fill:#e7f4ed">handled by @hello-bill/node</text>

  <!-- arrow 2 -->
  <line x1="644" y1="150" x2="748" y2="150" stroke="#00725e" stroke-width="3" stroke-linecap="round"/>
  <path d="M748,150 l-12,-7 v14 z" fill="#00725e"/>

  <!-- lead in bill os -->
  <rect class="card" x="760" y="92" width="152" height="116" rx="16" stroke="#00a081"/>
  <text class="title" x="836" y="136" text-anchor="middle" fill="#00725e">Lead in</text>
  <text class="title" x="836" y="162" text-anchor="middle" fill="#00725e">Bill OS</text>
  <text class="code" x="836" y="188" text-anchor="middle" fill="#00a081">status: created</text>

  <!-- webhook return -->
  <path d="M836,208 v40 q0,16 -16,16 h-640 q-16,0 -16,-16 v-40" fill="none" stroke="#00a081" stroke-width="3" stroke-dasharray="1 9" stroke-linecap="round"/>
  <path d="M164,208 l-7,12 h14 z" fill="#00a081"/>
  <text class="sub" x="480" y="288" text-anchor="middle" fill="#00725e">webhooks echo your referral_id + context — no polling needed</text>
</svg>
